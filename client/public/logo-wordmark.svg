<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" fill="none">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d3242"/>
      <stop offset="100%" stop-color="#0f4c35"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ecf91"/>
      <stop offset="100%" stop-color="#3bb77e"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd566"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="g2">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon square -->
  <rect width="72" height="72" rx="16" fill="url(#ibg)"/>
  <ellipse cx="21" cy="16" rx="20" ry="11" fill="white" opacity="0.04"/>

  <!-- Cart handle + neck -->
  <line x1="11" y1="22" x2="21" y2="22" stroke="url(#cg)" stroke-width="4" stroke-linecap="round"/>
  <line x1="21" y1="22" x2="21" y2="28" stroke="url(#cg)" stroke-width="4" stroke-linecap="round"/>

  <!-- Cart body trapezoid -->
  <path
    d="M21 28 L19 52 Q19 55 22 55 L51 55 Q54 55 55 52 L58 30 Q59 27 56 27 L24 27"
    stroke="url(#cg)"
    stroke-width="3.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Wheels -->
  <circle cx="30" cy="60" r="4" fill="url(#cg)"/>
  <circle cx="48" cy="60" r="4" fill="url(#cg)"/>

  <!-- Bolt -->
  <path
    d="M43 28 L36 41 L42 41 L34 55"
    stroke="url(#sg)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#g2)"
  />

  <!-- Spark dots -->
  <circle cx="58" cy="18" r="2.2" fill="#f5a623" opacity="0.8"/>
  <circle cx="54" cy="13" r="1.4" fill="#ffd566" opacity="0.55"/>

  <!-- Wordmark -->
  <!-- "Now" in amber, "Cart" in brand green, both bold Quicksand -->
  <text
    x="84"
    y="49"
    font-family="Quicksand, 'Segoe UI', system-ui, sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="-0.5"
  >
    <tspan fill="#f5a623">Now</tspan><tspan fill="#3bb77e">Cart</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="86"
    y="64"
    font-family="Lato, 'Segoe UI', system-ui, sans-serif"
    font-size="10"
    font-weight="400"
    fill="#5f6b66"
    letter-spacing="0.5"
  >Five ways in · one confident cart out</text>
</svg>
