name: Deploy NowCart

on:
  push:
    branches: [master, prod_dev]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  # ── Job 1: Frontend → S3 + CloudFront ──────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Sync to S3
        run: |
          aws s3 sync client/dist s3://nowcart-frontend-strizzy --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E12DWQGXBDIMR3 \
            --paths "/*"

  # ── Job 2: Backend → EC2 via SSH ───────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: deploy-frontend # runs after frontend succeeds
    environment:
      name: production
      url: https://d2hj5yrm8sue4v.cloudfront.net

    steps:
      - name: Write .env to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            printf '%s\n' \
              'APP_ENV=production' \
              'LLM_TEXT_PROVIDER=${{ secrets.LLM_TEXT_PROVIDER }}' \
              'LLM_VISION_PROVIDER=${{ secrets.LLM_VISION_PROVIDER }}' \
              'GROQ_API_KEYS=${{ secrets.GROQ_API_KEYS }}' \
              'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}' \
              'DATA_BACKEND=${{ secrets.DATA_BACKEND }}' \
              'AWS_REGION=${{ secrets.AWS_REGION }}' \
              'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}' \
              'AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
              'CACHE_IN_MEMORY=${{ secrets.CACHE_IN_MEMORY }}' \
              'SEMANTIC_SEARCH_ENABLED=${{ secrets.SEMANTIC_SEARCH_ENABLED }}' \
              > /opt/nowcart/server/.env
            chmod 600 /opt/nowcart/server/.env
            # Also write to /etc/nowcart.env so systemd EnvironmentFile picks it up
            sudo cp /opt/nowcart/server/.env /etc/nowcart.env
            sudo chmod 600 /etc/nowcart.env

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/nowcart
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            # Ensure systemd unit has EnvironmentFile pointing to our env file
            sudo sed -i '/\[Service\]/a EnvironmentFile=-/etc/nowcart.env' /etc/systemd/system/nowcart.service 2>/dev/null || true
            sudo grep -q 'EnvironmentFile' /etc/systemd/system/nowcart.service || \
              sudo sed -i 's/\[Service\]/[Service]\nEnvironmentFile=-\/etc\/nowcart.env/' /etc/systemd/system/nowcart.service
            sudo systemctl daemon-reload
            sudo systemctl restart nowcart
            echo "Backend deployed from ${{ github.ref_name }} at $(date)"
